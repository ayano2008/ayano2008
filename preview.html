<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Profile Links</title>
<style>
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: linear-gradient(180deg, #ffd9ec, #ffeef7);
    text-align: center;
    color: #444;
  }

  .container {
    max-width: 420px;
    margin: 0 auto;
    padding: 30px 20px;
  }

  .icon {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #fff;
    box-shadow: 0 4px 10px rgb(255 140 180 / 40%);
  }

  h1 {
    font-size: 24px;
    margin: 20px 0 10px;
    color: #ff5fa2;
  }

  p {
    font-size: 14px;
    margin-bottom: 25px;
    color: #666;
  }

  .link-btn {
    display: block;
    width: 100%;
    background: #ff82b2;
    padding: 14px 0;
    margin: 12px 0;
    border-radius: 14px;
    font-size: 16px;
    color: #fff;
    text-decoration: none;
    box-shadow: 0 4px 10px rgb(255 100 150 / 30%);
    transition: 0.2s;
  }

  .link-btn:hover {
    background: #ff5fa2;
    transform: translateY(-2px);
  }

  footer {
    margin-top: 40px;
    font-size: 12px;
    color: #888;
  }
</style>
</head>
<body>
  <div class="container">
    
    <!-- プロフィール画像（差し替え可） -->
    <img src="https://placehold.co/200x200?text=Icon" class="icon">

    <!-- 名前 -->
    <h1>あやの</h1>

    <!-- 一言紹介 -->
    <p>気軽に話してくれると嬉しいです♡</p>

    <!-- 誘導リンク（出会い系サイト） -->
    <a href="https://example.com" class="link-btn">💗 出会い系サイトはこちら 💗</a>

    <!-- 複数リンクもOK -->
    <a href="#" class="link-btn">🌸 Instagram</a>
    <a href="#" class="link-btn">💬 LINE</a>

    <footer>© 2024 My Profile</footer>
  </div>
</body>
</html>
